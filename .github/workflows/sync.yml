name: Sync to Organization Repo
on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: linux-x64-medium

    steps:
      - name: Checkout source repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Configure Git identity
        run: |
          git config user.name "muneeb-mashwani"
          git config user.email "muneebmashwani100@gmail.com"

      - name: Remove workflows before syncing
        run: |
          git rm -r --cached .github/workflows || true
          git commit -m "Remove workflows from sync" || true

      - name: Add destination repo remote and push
        env:
          SSH_AUTH_TOKEN: ${{ secrets.PAT_MERCK_SYNC_TO_EXTERNAL }}
        run: |
          git remote add dest https://muneeb-mashwani:${SSH_AUTH_TOKEN}@github.com/mmtesthoro/urban-memory.git
          git push dest main --force