name: Sync to Organization Repo

on:
  push:
    branches: [ main ]

jobs:
  sync:
    permissions: 
      contents: none
      packages: none
      pull-requests: none
    runs-on: linux-x64-medium

    steps:
      - name: Checkout source repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Configure Git identity
        run: |
          git config user.name "viethor"
          git config user.email "matuscogscimarton@gmail.com"

      - name: Check if PAT is present
        run: |
          echo "${{secrets.PAT_SYNC}}"

      - name: Add destination repo remote
        run: |
          git remote add dest https://viethor:${{ secrets.PAT_SYNC }}@github.com/mmtesthoro/urban-memory.git
          git remote -v
      - name: Push to destination repo
        run: |
          git push dest main --force
