name: Sync to Organization Repo

on:
  push:
    branches: [ main ]

jobs:
  sync:
    runs-on: linux-x64-medium

    steps:
      - name: Checkout source repo
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Configure Git identity
        run: |
          git config user.name "viethor"
          git config user.email "matuscogscimarton@gmail.com"

      - name: Check if PAT is present
        run: |
          echo "${{secrets.PAT_SYNC}}"

      - name: Add destination repo remote and push
        env:
          # Použití vašeho nového Secretu
          SSH_AUTH_TOKEN: ${{ secrets.PAT_SYNC }}
        run: |
          git remote add dest https://viethor:${SSH_AUTH_TOKEN}@github.com/mmtesthoro/urban-memory.git
          git push dest main --force
